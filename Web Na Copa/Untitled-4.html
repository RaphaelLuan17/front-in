<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quiz Futebol ⚽</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #0d6efd, #6610f2);
        color: #fff;
        min-height: 100vh;
      }

      .card {
        border-radius: 20px;
        animation: fadeIn 0.6s ease;
      }

      .option-btn {
        transition: 0.3s;
        font-weight: 500;
      }

      .option-btn:hover {
        transform: scale(1.05);
        background-color: #edfd0d;
        color: #000;
      }

      .progress-bar {
        transition: width 0.4s ease;
      }

      #result img {
        width: 200px;
        height: 200px;
        object-fit: cover;
        border-radius: 20px;
        margin-top: 15px;
        border: 4px solid #fff;
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .carousel {
        max-width: 1300px;
        margin: 20px auto;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      .carousel-item {
        height: 400px;
      }

      .carousel-item img {
        height: 100%;
        object-fit: cover;
        filter: brightness(70%);
      }

      .carousel-caption h2 {
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#"><h3>Quiz</h3></a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarCollapse"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link active" href="#">Início</a>
            </li>
            <li class="nav-item"><a class="nav-link" href="#">Produtos</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Contato</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- CAROUSEL -->
    <div id="carouselJogadores" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Neymar_2018.jpg"
            class="d-block w-100"
          />
          <div class="carousel-caption"><h2>Neymar Jr</h2></div>
        </div>

        <div class="carousel-item">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Vinicius_Jr_2023.jpg"
            class="d-block w-100"
          />
          <div class="carousel-caption"><h2>Vini Jr</h2></div>
        </div>

        <div class="carousel-item">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/9/99/Rodrygo_2023.jpg"
            class="d-block w-100"
          />
          <div class="carousel-caption"><h2>Rodrygo</h2></div>
        </div>

        <div class="carousel-item">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Casemiro_2022.jpg"
            class="d-block w-100"
          />
          <div class="carousel-caption"><h2>Casemiro</h2></div>
        </div>

        <div class="carousel-item">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/5/5a/Alisson_Becker_2018.jpg"
            class="d-block w-100"
          />
          <div class="carousel-caption"><h2>Alisson</h2></div>
        </div>

        <div class="carousel-item">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/8/8d/Marquinhos_PSG_2019.jpg"
            class="d-block w-100"
          />
          <div class="carousel-caption"><h2>Marquinhos</h2></div>
        </div>
      </div>

      <button
        class="carousel-control-prev"
        type="button"
        data-bs-target="#carouselJogadores"
        data-bs-slide="prev"
      >
        <span class="carousel-control-prev-icon"></span>
      </button>

      <button
        class="carousel-control-next"
        type="button"
        data-bs-target="#carouselJogadores"
        data-bs-slide="next"
      >
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>

    <!-- QUIZ -->
    <div class="container py-5">
      <div class="card shadow p-4 text-center">
        <h2 class="mb-4">Qual jogador você é? ⚽</h2>

        <div class="progress mb-4">
          <div
            id="progressBar"
            class="progress-bar bg-success"
            style="width: 0%"
          ></div>
        </div>

        <div id="quiz">
          <h5 id="question"></h5>
          <div id="options" class="mt-3"></div>
        </div>

        <div id="result" class="mt-4 d-none"></div>

        <button id="restartBtn" class="btn btn-warning mt-3 d-none">
          Refazer Quiz
        </button>
      </div>
    </div>

    <script>
      const questions = [
        {
          text: "1. Qual sua posição?",
          options: [
            { text: "Ponta rápido", type: "Vini" },
            { text: "Atacante decisivo", type: "Rodrygo" },
            { text: "Meia criativo", type: "Neymar" },
            { text: "Volante", type: "Casemiro" },
            { text: "Zagueiro", type: "Marquinhos" },
            { text: "Goleiro", type: "Alisson" },
          ],
        },
        {
          text: "2. Seu ponto forte?",
          options: [
            { text: "Drible", type: "Neymar" },
            { text: "Velocidade", type: "Vini" },
            { text: "Decisão", type: "Rodrygo" },
            { text: "Marcação", type: "Casemiro" },
            { text: "Defesa", type: "Marquinhos" },
            { text: "Reflexo", type: "Alisson" },
          ],
        },
        {
          text: "3. Personalidade?",
          options: [
            { text: "Showman", type: "Neymar" },
            { text: "Alegre", type: "Vini" },
            { text: "Frio", type: "Rodrygo" },
            { text: "Líder", type: "Casemiro" },
            { text: "Calmo", type: "Marquinhos" },
            { text: "Seguro", type: "Alisson" },
          ],
        },
      ];

      let index = 0;
      let scores = {
        Neymar: 0,
        Vini: 0,
        Rodrygo: 0,
        Casemiro: 0,
        Marquinhos: 0,
        Alisson: 0,
      };

      const players = {
        Neymar: {
          name: "Neymar Jr.",
          img: "img/n.jpg",
          desc: "Você é habilidoso, criativo e gosta de brilhar!",
        },
        Vini: {
          name: "Vini Jr.",
          img: "img/v.jpg",
          desc: "Velocidade absurda e muita ousadia!",
        },
        Rodrygo: {
          name: "Rodrygo",
          img: "img/r.jpg",
          desc: "Decisivo e frio nos momentos importantes!",
        },
        Casemiro: {
          name: "Casemiro",
          img: "img/c.jpg",
          desc: "Raça, marcação forte e liderança!",
        },
        Marquinhos: {
          name: "Marquinhos",
          img: "img/m.jpg",
          desc: "Defensor técnico e inteligente!",
        },
        Alisson: {
          name: "Alisson Becker",
          img: "img/a.jpg",
          desc: "Segurança total no gol!",
        },
      };

      function loadQuestion() {
        if (index >= questions.length) return showResult();

        let q = questions[index];
        document.getElementById("question").innerText = q.text;

        let html = "";
        q.options.forEach((opt) => {
          html += `<button class="btn btn-light w-100 my-2 option-btn"
              onclick="answer('${opt.type}')">${opt.text}</button>`;
        });

        document.getElementById("options").innerHTML = html;
        document.getElementById("progressBar").style.width =
          (index / questions.length) * 100 + "%";
      }

      function answer(type) {
        scores[type]++;
        index++;
        loadQuestion();
      }

      function showResult() {
        document.getElementById("quiz").classList.add("d-none");

        let max = Math.max(...Object.values(scores));
        let winners = Object.keys(scores).filter((p) => scores[p] === max);
        let final = winners[Math.floor(Math.random() * winners.length)];

        let p = players[final];

        document.getElementById("result").innerHTML = `
    <h3 class="fw-bold">${p.name}</h3>
    <img src="${p.img}">
    <p class="mt-3">${p.desc}</p>
  `;

        document.getElementById("result").classList.remove("d-none");
        document.getElementById("restartBtn").classList.remove("d-none");
        document.getElementById("progressBar").style.width = "100%";
      }

      document.getElementById("restartBtn").onclick = () => {
        index = 0;
        scores = {
          Neymar: 0,
          Vini: 0,
          Rodrygo: 0,
          Casemiro: 0,
          Marquinhos: 0,
          Alisson: 0,
        };

        document.getElementById("quiz").classList.remove("d-none");
        document.getElementById("result").classList.add("d-none");
        document.getElementById("restartBtn").classList.add("d-none");

        loadQuestion();
      };

      loadQuestion();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
