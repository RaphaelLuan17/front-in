<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz Futebol ⚽</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0d6efd, #6610f2);
    color: #fff;
    min-height: 100vh;
}

.card {
    border-radius: 20px;
    animation: fadeIn 0.6s ease;
}

.option-btn {
    transition: 0.3s;
    font-weight: 500;
}

.option-btn:hover {
    transform: scale(1.05);
    background-color: #0d6efd;
    color: #fff;
}

.progress-bar {
    transition: width 0.4s ease;
}

#result img {
    width: 160px;
    height: 160px;
    object-fit: cover;
    border-radius: 50%;
    margin-top: 15px;
    border: 4px solid #fff;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(15px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container py-5">
    <div class="card shadow p-4 text-center">

        <h2 class="mb-4">Qual jogador você é? ⚽</h2>

        <div class="progress mb-4">
            <div id="progressBar" class="progress-bar bg-success" style="width: 0%"></div>
        </div>

        <div id="quiz">
            <h5 id="question"></h5>
            <div id="options" class="mt-3"></div>
        </div>

        <div id="result" class="mt-4 d-none"></div>

        <button id="restartBtn" class="btn btn-warning mt-3 d-none">Refazer Quiz</button>

    </div>
</div>

<script>
const questions = [
    {
        text: "1. Qual sua posição?",
        options: [
            { text: "Ponta rápido", type: "Vini" },
            { text: "Centroavante", type: "CR7" },
            { text: "Meia criador", type: "Messi" },
            { text: "Zagueiro", type: "VanDijk" },
            { text: "Habilidoso", type: "Neymar" },
            { text: "Velocidade absurda", type: "Mbappe" }
        ]
    },
    {
        text: "2. Seu ponto forte?",
        options: [
            { text: "Drible", type: "Neymar" },
            { text: "Finalização", type: "CR7" },
            { text: "Visão de jogo", type: "Messi" },
            { text: "Defesa", type: "VanDijk" },
            { text: "Velocidade", type: "Mbappe" },
            { text: "Explosão", type: "Vini" }
        ]
    },
    {
        text: "3. Personalidade?",
        options: [
            { text: "Alegre", type: "Vini" },
            { text: "Focado", type: "CR7" },
            { text: "Reservado", type: "Messi" },
            { text: "Líder", type: "VanDijk" },
            { text: "Showman", type: "Neymar" },
            { text: "Confiante", type: "Mbappe" }
        ]
    }
];

let index = 0;
let scores = {
    Vini: 0,
    CR7: 0,
    Messi: 0,
    VanDijk: 0,
    Neymar: 0,
    Mbappe: 0
};

const players = {
    Vini: {
        name: "Vini Jr.",
        img: "https://upload.wikimedia.org/wikipedia/commons/0/0c/Vinicius_Jr_2023.jpg",
        desc: "Você é rápido, ousado e imprevisível!"
    },
    CR7: {
        name: "Cristiano Ronaldo",
        img: "https://upload.wikimedia.org/wikipedia/commons/8/8c/Cristiano_Ronaldo_2018.jpg",
        desc: "Disciplina e mentalidade de campeão!"
    },
    Messi: {
        name: "Lionel Messi",
        img: "https://upload.wikimedia.org/wikipedia/commons/c/c1/Lionel_Messi_20180626.jpg",
        desc: "Genialidade pura e visão absurda!"
    },
    VanDijk: {
        name: "Van Dijk",
        img: "https://upload.wikimedia.org/wikipedia/commons/5/5e/Virgil_van_Dijk_2018.jpg",
        desc: "Defesa sólida e liderança!"
    },
    Neymar: {
        name: "Neymar Jr.",
        img: "https://upload.wikimedia.org/wikipedia/commons/7/7c/Neymar_2018.jpg",
        desc: "Criativo, habilidoso e cheio de estilo!"
    },
    Mbappe: {
        name: "Mbappé",
        img: "https://upload.wikimedia.org/wikipedia/commons/a/a8/Kylian_Mbapp%C3%A9_2019.jpg",
        desc: "Velocidade e explosão incríveis!"
    }
};

function loadQuestion() {
    if (index >= questions.length) {
        showResult();
        return;
    }

    let q = questions[index];
    document.getElementById("question").innerText = q.text;

    let optionsHTML = "";
    q.options.forEach(opt => {
        optionsHTML += `
            <button class="btn btn-light w-100 my-2 option-btn"
                onclick="answer('${opt.type}')">
                ${opt.text}
            </button>`;
    });

    document.getElementById("options").innerHTML = optionsHTML;

    let progress = (index / questions.length) * 100;
    document.getElementById("progressBar").style.width = progress + "%";
}

function answer(type) {
    scores[type]++;
    index++;

    document.querySelector(".card").style.animation = "none";
    setTimeout(() => {
        document.querySelector(".card").style.animation = "fadeIn 0.5s ease";
    }, 10);

    loadQuestion();
}

function showResult() {
    document.getElementById("quiz").classList.add("d-none");

    let max = Math.max(...Object.values(scores));
    let winners = Object.keys(scores).filter(p => scores[p] === max);
    let final = winners[Math.floor(Math.random() * winners.length)];

    let player = players[final];

    let borderColor = final === "CR7" ? "gold" : "#fff";

    document.getElementById("result").innerHTML = `
        <h3 class="fw-bold">${player.name}</h3>
        <img src="${player.img}" style="border:4px solid ${borderColor}">
        <p class="mt-3">${player.desc}</p>
    `;

    document.getElementById("result").classList.remove("d-none");
    document.getElementById("restartBtn").classList.remove("d-none");

    document.getElementById("progressBar").style.width = "100%";
}

document.getElementById("restartBtn").onclick = () => {
    index = 0;
    scores = { Vini:0, CR7:0, Messi:0, VanDijk:0, Neymar:0, Mbappe:0 };

    document.getElementById("quiz").classList.remove("d-none");
    document.getElementById("result").classList.add("d-none");
    document.getElementById("restartBtn").classList.add("d-none");

    loadQuestion();
};

loadQuestion();
</script>

</body>
</html>
